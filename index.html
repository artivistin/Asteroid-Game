<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asteroids Arcade</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game-shell">
      <h1>Asteroids Arcade</h1>
      <p class="subtitle">Retro-Arcade in Vanilla HTML, CSS & JavaScript</p>

      <canvas id="gameCanvas" width="900" height="600" aria-label="Asteroids Spielbereich"></canvas>

      <div class="hud" aria-live="polite">
        <span id="score">Score: 0</span>
        <span id="lives">Leben: 3</span>
        <span id="status">Status: Läuft</span>
      </div>

      <p class="controls">
        Steuerung: <strong>←/→</strong> drehen, <strong>↑</strong> Schub, <strong>Leertaste</strong> schießen
      </p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
